name: Monthly VMware Metadata Update

# Broadcom 发新版平均间隔 91 天（3 个月），按月执行绰绰有余
# 数据来源：data/vmware_downloads.json 显示 2024-05 至 2026-05 共 9 次发布
# 触发时机：每月 1 号 UTC 06:00（北京时间 14:00，Broadcom 美西上班后）

on:
  schedule:
    - cron: '0 6 1 * *'  # 每月 1 号 06:00 UTC
  workflow_dispatch:  # 支持手动触发（测试用）

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright pytest

      - name: 缓存 Playwright 浏览器（省 15 秒）
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: 装 Playwright Chromium（未命中缓存时）
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: 装 Playwright 系统依赖（命中缓存时）
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      - name: 单元测试（回归保底）
        run: pytest -q

      - name: 抓取 Broadcom 官方元数据
        env:
          BROADCOM_USERNAME: ${{ secrets.BROADCOM_USERNAME }}
          BROADCOM_PASSWORD: ${{ secrets.BROADCOM_PASSWORD }}
        run: |
          python scripts/fetch_broadcom.py

      - name: 融合 archive.org + 渲染 README/checksums
        run: |
          python scripts/collect_vmware_links.py

      - name: 检查是否有真实数据变化（剔除时间戳噪声）
        id: check_diff
        run: |
          if python scripts/detect_data_changes.py; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🆕 检测到真实数据变化，准备开 PR"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "🔇 仅时间戳被刷新，静默跳过"
          fi

      - name: 摘要变化条目（PR body 用）
        if: steps.check_diff.outputs.changed == 'true'
        run: python scripts/summarize_changes.py > /tmp/pr_body.md

      - name: 提 PR（若有变化）
        if: steps.check_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(data): 月度自动更新 Broadcom 元数据

            由 monthly-update.yml 触发，Broadcom Support Portal API 拦截抓取
          title: "🤖 Monthly VMware Update - run #${{ github.run_number }}"
          body-path: /tmp/pr_body.md
          branch: auto/monthly-update
          delete-branch: true
          labels: |
            automated
            data-update
