name: Collect VMware Download Links

on:
  schedule:
    # 每天 UTC 00:00 运行（北京时间 08:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run collector script
        env:
          BROADCOM_USERNAME: ${{ secrets.BROADCOM_USERNAME }}
          BROADCOM_PASSWORD: ${{ secrets.BROADCOM_PASSWORD }}
        run: python scripts/collect_vmware_links.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/ README.md
          
          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "没有变更需要提交"
          else
            git commit -m "chore: 更新 VMware 下载链接 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
