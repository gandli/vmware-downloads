name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # audit v4 P2-C · 前向兼容矩阵（3.11 base + 3.12/3.13 前向）
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false  # 本 job 只跑 lint/pytest，无需 git auth

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.lock

      - name: Install dev dependencies (lockfile for repro)
        # audit v4 P2-A · 用 lockfile 保证 CI 与本地版本一致
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.lock

      - name: Ruff lint
        run: ruff check scripts/ tests/

      - name: Type check (mypy)
        run: mypy scripts/vmware_lib

      - name: SAST (bandit)
        run: bandit -r scripts/vmware_lib -c pyproject.toml

      - name: Pytest with coverage (library code)
        run: |
          pytest -q --cov --cov-report=term-missing --cov-fail-under=95

      - name: Verify README is in sync
        run: |
          python3 -c "
          import json, sys
          sys.path.insert(0, 'scripts')
          from vmware_lib.renderer import render_readme, render_checksums
          data = json.load(open('data/vmware_downloads.json'))
          expected_readme = render_readme(data)
          expected_checksums = render_checksums(data)
          import pathlib
          current_readme = pathlib.Path('README.md').read_text()
          current_checksums = pathlib.Path('data/checksums.txt').read_text()
          drift = []
          if current_readme != expected_readme:
              drift.append('README.md 与 data/vmware_downloads.json 不同步')
          if current_checksums != expected_checksums:
              drift.append('data/checksums.txt 与 data/vmware_downloads.json 不同步')
          if drift:
              print('\n'.join(drift))
              print()
              print('请在本地跑：')
              print('  python3 -c \"import json,sys; sys.path.insert(0,\\\"scripts\\\"); from vmware_lib.renderer import render_readme, render_checksums; d=json.load(open(\\\"data/vmware_downloads.json\\\")); open(\\\"README.md\\\",\\\"w\\\").write(render_readme(d)); open(\\\"data/checksums.txt\\\",\\\"w\\\").write(render_checksums(d))\"')
              sys.exit(1)
          print('✅ README 与数据同步')
          "
