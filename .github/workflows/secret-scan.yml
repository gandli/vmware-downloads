name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"   # 每周一 04:00 UTC 全量扫

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # gitleaks 需要全量历史

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 不需要 GITLEAKS_LICENSE，本仓库是公开的
