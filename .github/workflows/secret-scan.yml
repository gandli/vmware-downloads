name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"   # 每周一 04:00 UTC 全量扫

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks 需要全量历史

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 不需要 GITLEAKS_LICENSE，本仓库是公开的
