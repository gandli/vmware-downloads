<svg xmlns="http://www.w3.org/2000/svg"
     width="420" height="64" viewBox="0 0 420 64"
     role="img" aria-labelledby="title desc">
  <title id="title">README made with beautify-github-readme</title>
  <desc id="desc">本仓库 README 由 beautify-github-readme skill 装修</desc>

  <rect width="420" height="64" rx="16" fill="#0a1626" stroke="#1d3a5c"/>

  <!-- 左侧：校验 mark (呼应 hero 的 OK 主题) -->
  <g transform="translate(24 32)" font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace" font-size="13" font-weight="700">
    <text x="0" y="5" fill="#3fb950">✓</text>
    <text x="20" y="5" fill="#9fb6d0">verified</text>
  </g>

  <!-- 中间分隔 -->
  <line x1="150" y1="16" x2="150" y2="48" stroke="#1d3a5c"/>

  <!-- 右侧：README MADE WITH + 链接 -->
  <text x="174" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" fill="#6b86a6" letter-spacing="0.5">README MADE WITH</text>
  <text x="174" y="48" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#eaf1f8">beautify-github-readme</text>

  <!-- 右下出站箭头 -->
  <path d="M385 44 l10 -10 m0 0 l-10 -10 m10 10 l-22 0" stroke="#0071c5" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
